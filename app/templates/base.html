<!doctype html>
<html lang="en" data-bs-theme="{{ theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BB Study{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}">
      <i class="bi bi-book-half me-1"></i>BB Study
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}"
             href="{{ url_for('main.index') }}"><i class="bi bi-house-door me-1"></i>Read</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.search' %}active{% endif %}"
             href="{{ url_for('main.search') }}"><i class="bi bi-search me-1"></i>Search</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle {% if request.endpoint in ['main.books', 'main.pamphlets'] %}active{% endif %}"
             href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-journals me-1"></i>Library
          </a>
          <ul class="dropdown-menu">
            <li>
              <a class="dropdown-item {% if request.endpoint == 'main.books' %}active{% endif %}"
                 href="{{ url_for('main.books') }}"><i class="bi bi-book me-1"></i>Books</a>
            </li>
            <li>
              <a class="dropdown-item {% if request.endpoint == 'main.pamphlets' %}active{% endif %}"
                 href="{{ url_for('main.pamphlets') }}"><i class="bi bi-file-earmark-text me-1"></i>Pamphlets</a>
            </li>
          </ul>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle {% if request.endpoint in ['main.dictionary', 'main.topics', 'main.references', 'main.commentary', 'main.sources'] %}active{% endif %}"
             href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-collection me-1"></i>Study Data
          </a>
          <ul class="dropdown-menu">
            <li>
              <a class="dropdown-item {% if request.endpoint == 'main.dictionary' %}active{% endif %}"
                 href="{{ url_for('main.dictionary') }}"><i class="bi bi-alphabet me-1"></i>Dictionary</a>
            </li>
            <li>
              <a class="dropdown-item {% if request.endpoint == 'main.topics' %}active{% endif %}"
                 href="{{ url_for('main.topics') }}"><i class="bi bi-tags me-1"></i>Topics</a>
            </li>
            <li>
              <a class="dropdown-item {% if request.endpoint == 'main.references' %}active{% endif %}"
                 href="{{ url_for('main.references') }}"><i class="bi bi-link-45deg me-1"></i>References</a>
            </li>
            <li>
              <a class="dropdown-item {% if request.endpoint == 'main.commentary' %}active{% endif %}"
                 href="{{ url_for('main.commentary') }}"><i class="bi bi-chat-square-text me-1"></i>Commentary</a>
            </li>
            <li>
              <a class="dropdown-item {% if request.endpoint == 'main.sources' %}active{% endif %}"
                 href="{{ url_for('main.sources') }}"><i class="bi bi-globe me-1"></i>Sources</a>
            </li>
          </ul>
        </li>
      </ul>
      {% block navbar_tools %}{% endblock %}
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.settings' %}active{% endif %}"
             href="{{ url_for('main.settings') }}"><i class="bi bi-file-earmark-pdf me-1"></i>Export Settings</a>
        </li>
        <li class="nav-item ms-2">
          <button class="btn btn-sm btn-outline-light" id="themeToggleBtn" title="Toggle light/dark mode">
            <i class="bi {% if theme == 'dark' %}bi-sun{% else %}bi-moon-stars{% endif %}"></i>
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div id="alertContainer"></div>

<main class="container-fluid py-3">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
